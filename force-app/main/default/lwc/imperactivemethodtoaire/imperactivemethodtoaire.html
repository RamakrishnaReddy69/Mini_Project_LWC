<template>
    <lightning-card
        title=" Apex class calling to imperactive and Standard Object ">
        <div class="slds-m-around_medium">
            <lightning-input label="Id" disabled
                onchange={handleId}></lightning-input>
            <lightning-input label="Name" value={name}
                onchange={handlename}></lightning-input>
            <lightning-input label="Industry" value={industry}
                onchange={handleindustry}></lightning-input>
            <br>
            <lightning-button label="Create Account"
                onclick={handlecreateaccount}></lightning-button>
        </div>
    </lightning-card>
</template>
