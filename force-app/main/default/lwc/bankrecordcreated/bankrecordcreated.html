<template>
    <lightning-card title="Bank Recored and custom Object ">
        <div class="slds-m-around_medium">
            <lightning-input label="Id" disabled
                onchange={handleId}></lightning-input>
            <lightning-input label="Bank Name" value={bankname}
                onchange={handlechangename}>
            </lightning-input>
            <lightning-input label="Country" value={Country}
                onchange={handlerchangecountry}>
            </lightning-input>
            <lightning-input label="BankEmail" value={bankemail}
                onchange={handlechangeemail}>
            </lightning-input><br>
            <lightning-button label="created record"
                onclick={handleclikcreatedrec}></lightning-button>
        </div>
    </lightning-card>
</template>
