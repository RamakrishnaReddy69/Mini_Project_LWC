<template>
    <lightning-card title="Contacts List (Lightning Data Service)">
        <template if:true={contacts}>
            <ul class="slds-m-around_medium">
                <template for:each={contacts} for:item="contact">
                    <li key={contact.id} class="slds-p-vertical_x-small">
                        <strong>{contact.fields.Name.value}</strong>
                        <template if:true={contact.fields.Email.value}>
                            - {contact.fields.Email.value}
                        </template>
                        <template if:true={contact.fields.Phone.value}>
                            | {contact.fields.Phone.value}
                        </template>
                    </li>
                </template>
            </ul>
        </template>
        <template if:true={error}>
            <div class="slds-m-around_medium">
                <p class="slds-text-color_error">
                    Error loading contacts: 
                    <template if:true={error.body.message}>
                        {error.body.message}
                    </template>
                    <template if:false={error.body.message}>
                        {error.message}
                    </template>
                </p>
            </div>
        </template>
        <template if:false={contacts}>
            <template if:false={error}>
                <div class="slds-m-around_medium">
                    <p>No contacts found. Make sure you have contacts in your org with the "AllContacts" list view.</p>
                </div>
            </template>
        </template>
    </lightning-card>
</template>
