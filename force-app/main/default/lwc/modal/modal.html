<template>
    <template if:true={isModalOpen}>
        <section class="slds-modal slds-fade-in-open"
            role="dialog"
            aria-labelledby="modal-heading"
            aria-modal="true">
        <div class="slds-modal__container">
            <!-- Modal Header -->
            <header class="slds-modal__header">
                <h2 id="modal-heading" tabindex="-1"
                    class="slds-text-heading_medium">{headerTitle}</h2>
                <button
                    class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                    title="Close" onclick={closeModal}>
                    <lightning-icon icon-name="utility:close"
                        alternative-text="close"
                        variant="inverse"></lightning-icon>
                </button>
            </header>
            <!-- Modal Body -->
            <div class="slds-modal__content slds-p-around_medium">
                <template if:true={record}>
                    <lightning-input label="Name" value={record.Name} data-field="Name" onchange={handleFieldChange}></lightning-input>
                    <lightning-input label="Phone" value={record.Phone} data-field="Phone" onchange={handleFieldChange}></lightning-input>
                    <lightning-input label="Industry" value={record.Industry} data-field="Industry" onchange={handleFieldChange}></lightning-input>
                </template>
                <template if:false={record}>
                    <slot></slot>
                </template>
            </div>
            <!-- Modal Footer -->
            <footer class="slds-modal__footer">
                <lightning-button label="Cancel"
                    onclick={closeModal}></lightning-button>
                <lightning-button label="Save" variant="brand"
                    onclick={handleSave}></lightning-button>
            </footer>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
